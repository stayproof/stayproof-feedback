name: Bug Report
description: Report a bug in StayProof
title: "[Bug] "
labels: ["bug"]
body:
  - type: checkboxes
    attributes:
      label: Prerequisites
      options:
        - label: I searched existing issues to avoid duplicates
          required: true
  - type: dropdown
    attributes:
      label: Platform affected
      options:
        - All platforms
        - Booking.com
        - Airbnb
        - Agoda
        - Google Maps cross-reference
        - Search page UI
    validations:
      required: true
  - type: input
    attributes:
      label: StayProof version
      placeholder: "e.g., 1.0.0 (shown in extension popup)"
    validations:
      required: true
  - type: input
    attributes:
      label: Chrome version
      placeholder: "e.g., 124.0.6367.91 (chrome://version)"
    validations:
      required: true
  - type: textarea
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Search for [destination]
        2. Set dates to [dates]
        3. Observe [problem]
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false
